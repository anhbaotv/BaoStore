name: Tự động cập nhật Kho ứng dụng

# Robot sẽ tự động chạy vào lúc 12:00 trưa mỗi ngày (UTC+0, tức là 7h tối VN)
# Bạn cũng có thể bấm chạy thủ công trên GitHub (workflow_dispatch)
on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  update-json:
    runs-on: ubuntu-latest

    steps:
      - name: Lấy mã nguồn (Checkout)
        uses: actions/checkout@v3

      - name: Cài đặt Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Cài thư viện Requests
        run: pip install requests

      - name: Chạy Script kiểm tra phiên bản mới
        run: python update_apps.py

      - name: Lưu file Baoapp.json lên GitHub
        run: |
          git config --global user.name "BaoStore Bot"
          git config --global user.email "bot@baostore.tv"
          git add Baoapp.json
          # Chỉ commit nếu file JSON có thay đổi
          git diff --quiet && git diff --staged --quiet || (git commit -m "🚀 Auto Update: Đã cập nhật phiên bản ứng dụng mới" && git push)
